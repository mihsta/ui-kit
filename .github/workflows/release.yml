name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      confirm_publish:
        description: 'Type "publish" to release to registry.npmjs.org'
        required: true
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  prepare-release-pr:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: |
          npm run lint
          npm run test
          npm run build

      - name: Create or update release PR
        uses: changesets/action@v1
        with:
          commit: 'chore: release package versions'
          title: 'chore: release package versions'
          version: npm run version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-github-release:
    if: "github.event_name == 'push' && github.event.head_commit != null && startsWith(github.event.head_commit.message, 'chore: release package versions')"
    runs-on: ubuntu-latest
    needs: [prepare-release-pr]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and pack
        run: |
          npm run build
          PACKAGE_FILE="$(npm pack | tail -n 1)"
          echo "PACKAGE_FILE=${PACKAGE_FILE}" >> "$GITHUB_ENV"

      - name: Create release notes
        env:
          REPO: ${{ github.repository }}
        run: |
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          TARBALL="${PACKAGE_FILE}"
          sed -e "s|\$VERSION|${VERSION}|g" -e "s|\$TARBALL|${TARBALL}|g" -e "s|\$REPO|${REPO}|g" \
            .github/RELEASE_NOTES_TEMPLATE.md > release-notes.md
          sed -n "/^## ${VERSION}$/,/^## /p" CHANGELOG.md | sed '$d' >> release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          TAG="v${VERSION}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release ${TAG} already exists"
            exit 0
          fi
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --notes-file release-notes.md \
            "$PACKAGE_FILE"

  publish-to-npm:
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_publish == 'publish' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run quality gates
        run: |
          npm run lint
          npm run test
          npm run build

      - name: Publish package to npm
        run: npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

