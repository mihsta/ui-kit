name: CI

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-storybook:
    runs-on: ubuntu-latest
    outputs:
      has_storybook: ${{ steps.check.outputs.has_storybook }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check Storybook config
        id: check
        run: |
          if [ -d .storybook ]; then
            echo "has_storybook=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_storybook=false" >> "$GITHUB_OUTPUT"
          fi

  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "package-lock.json not found, using npm install"
            npm install
          fi

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Run build
        run: npm run build

      - name: Pack npm release artifact
        id: pack
        run: |
          PACKAGE_FILE="$(npm pack | tail -n 1)"
          echo "file=${PACKAGE_FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v5
        with:
          name: npm-package-${{ github.sha }}
          path: ${{ steps.pack.outputs.file }}

  build-storybook:
    if: ${{ needs.detect-storybook.outputs.has_storybook == 'true' }}
    runs-on: ubuntu-latest
    needs: [detect-storybook, lint-and-build]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "package-lock.json not found, using npm install"
            npm install
          fi

      - name: Build Storybook
        run: npm run build-storybook
